<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台大食堂 - 線上點餐系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }
        .form-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .menu-item:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen py-8 px-4">
    <div class="max-w-md mx-auto">
        <!-- 標題區 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-700">台大食堂 NTU Canteen</h1>
            <p class="text-gray-500 mt-2">線上預約系統 (預覽模式)</p>
        </div>

        <!-- 表單區 -->
        <form id="orderForm" class="form-card p-6 space-y-6">
            <!-- 訂購人資訊 -->
            <div class="space-y-4">
                <h2 class="text-lg font-bold text-gray-700 border-l-4 border-red-600 pl-2">基本資訊</h2>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">姓名</label>
                    <input type="text" name="name" id="name" required placeholder="請輸入姓名"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">單位 (系級/處室)</label>
                    <input type="text" name="department" id="department" required placeholder="例如：資工系、學務處"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">希望取餐時間</label>
                    <select name="pickupTime" id="pickupTime" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none transition bg-white">
                        <option value="" disabled selected>請選擇取餐時間</option>
                        <option value="11:30">11:30</option>
                        <option value="12:00">12:00</option>
                        <option value="12:30">12:30</option>
                        <option value="13:00">13:00</option>
                        <option value="17:30">17:30</option>
                        <option value="18:00">18:00</option>
                    </select>
                </div>
            </div>

            <!-- 餐點選擇 -->
            <div class="space-y-4">
                <h2 class="text-lg font-bold text-gray-700 border-l-4 border-red-600 pl-2">餐點選購</h2>
                
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl menu-item transition">
                    <div>
                        <span class="font-bold block text-gray-800">滷肉飯</span>
                        <span class="text-xs text-gray-500">NT$ 40</span>
                    </div>
                    <input type="number" name="braised_pork_rice" id="item1" min="0" value="0"
                        class="w-20 px-2 py-1 text-center rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl menu-item transition">
                    <div>
                        <span class="font-bold block text-gray-800">乾麵</span>
                        <span class="text-xs text-gray-500">NT$ 45</span>
                    </div>
                    <input type="number" name="dry_noodles" id="item2" min="0" value="0"
                        class="w-20 px-2 py-1 text-center rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 outline-none">
                </div>

                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl menu-item transition">
                    <div>
                        <span class="font-bold block text-gray-800">貢丸湯</span>
                        <span class="text-xs text-gray-500">NT$ 30</span>
                    </div>
                    <input type="number" name="meatball_soup" id="item3" min="0" value="0"
                        class="w-20 px-2 py-1 text-center rounded-lg border border-gray-300 focus:ring-2 focus:ring-red-500 outline-none">
                </div>
            </div>

            <!-- 提交按鈕 -->
            <button type="submit" id="submitBtn"
                class="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 transform active:scale-95">
                送出訂單
            </button>
        </form>

        <!-- 狀態顯示層 -->
        <div id="overlay" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
            <div id="statusBox" class="bg-white p-8 rounded-3xl text-center max-w-xs w-full shadow-2xl">
                <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-4 border-red-700 border-t-transparent mx-auto mb-4"></div>
                <div id="successIcon" class="hidden text-5xl mb-4 text-green-500">✓</div>
                <h3 id="statusText" class="text-xl font-bold text-gray-800">訂單處理中...</h3>
                <p id="subText" class="text-gray-500 mt-2">正在模擬寫入試算表</p>
                <button onclick="hideOverlay()" class="mt-6 w-full bg-gray-100 py-2 rounded-xl text-gray-600 font-medium">返回修改</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('orderForm');
        const overlay = document.getElementById('overlay');
        const spinner = document.getElementById('spinner');
        const successIcon = document.getElementById('successIcon');
        const statusText = document.getElementById('statusText');
        const subText = document.getElementById('subText');

        function hideOverlay() {
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            successIcon.classList.add('hidden');
            spinner.classList.remove('hidden');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 顯示遮罩層
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            statusText.innerText = "訂單處理中...";

            // 模擬 Apps Script 處理時間
            setTimeout(() => {
                spinner.classList.add('hidden');
                successIcon.classList.remove('hidden');
                statusText.innerText = "訂購成功！";
                subText.innerText = "資料已模擬寫入您的試算表單。";
            }, 1500);
        });
    </script>
</body>
</html>
